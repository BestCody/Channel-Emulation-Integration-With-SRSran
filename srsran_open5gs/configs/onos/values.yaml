---
nameOverride: ""

image:
  repository: onosproject/onos
  tag: 2.5.7-rc1
  pullPolicy: IfNotPresent
  pullSecrets: []

replicas: 1
java_opts: -Xmx4G -Dlog4j2.formatMsgNoLookups=true
probe_timeout: 5
apps:
- org.onosproject.drivers
- org.onosproject.openflow
- org.onosproject.lldpprovider
- org.onosproject.fwd

atomix:
  replicas: 0
  persistence:
    enabled: false


podAntiAffinity:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10

resources:
  requests:
    cpu: 2
    memory: 2048Mi
  limits:
    cpu: ~
    memory: ~

individualOpenFlowNodePorts: true

# Profiler can use nodePort, proxy, or port-forward
profiler:
  exposeNodePort: false

ports:
  - name: openflow
    port: 6653
  - name: ovsdb
    port: 6640
  - name: east-west
    port: 9876
  - name: cli
    port: 8101
  - name: ui
    port: 8181

# logging:
#   karafVersion: 4.2.14
#   config: |
#     # Just an example. See org.ops4j.pax.logging.cfg for details.
#
#     log4j2.rootLogger.level = DEBUG
#
#     log4j2.rootLogger.appenderRef.Console.ref = Console
#     log4j2.appender.console.type = Console
#     log4j2.appender.console.name = Console
#     log4j2.appender.console.layout.type = PatternLayout
#     log4j2.appender.console.layout.pattern = %d{RFC3339} %-5level [%c{1}] %msg%n%throwable
#
app_label: onos-classic


# ONOS config loader settings
config:
  reconcile_mode: true
  reconcile_interval: 30s
  image:
    registry: ""
    repository: opencord/onos-classic-helm-utils
    tag: 0.1.0
    pullPolicy: "IfNotPresent"
  service_account_name: onos-config-loader
  # Loader-only settings
  username: karaf
  password: karaf
  # netcfg is posted to /onos/v1/network/configuration
  #netcfg: >
  #  {}
  # componentConfig posts JSON by component name
  # componentConfig:
  #   "org.onosproject.provider.lldp.impl.LldpLinkProvider": >
  #     {
  #       "enabled": "false"
  #     }

podsecuritypolicy:
  enabled: false


# expose ONOS outside cluster
onosApiPort: 30081
onosSshPort: 30082

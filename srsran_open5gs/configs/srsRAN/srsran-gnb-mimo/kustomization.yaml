apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 2-antenna gNB: two ZMQ stream pairs into the live channel
resources:
  - ../srsran-gnb

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: srsran-gnb
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SRSRAN_GNB_ANTENNAS
          value: "2"

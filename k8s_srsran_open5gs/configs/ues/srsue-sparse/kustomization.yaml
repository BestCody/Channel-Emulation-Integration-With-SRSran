apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../srsue-fixed

configMapGenerator:
  - name: ue1-configmap
    behavior: merge
    files:
      - config/multi_ue_sparse_channel.py
      - config/start_gnu_sparse_channel.sh

images:
  - name: ghcr.io/sulaimanalmani/srsranzmq/srsue
    newName: localhost/srsue-sparse
    newTag: stage3-gr38-v1

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: srsran-ue1
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: add
        path: /spec/template/spec/volumes/0/configMap/items/-
        value:
          key: multi_ue_sparse_channel.py
          path: multi_ue_sparse_channel.py
      - op: add
        path: /spec/template/spec/volumes/0/configMap/items/-
        value:
          key: start_gnu_sparse_channel.sh
          path: start_gnu_sparse_channel.sh
          mode: 0755
